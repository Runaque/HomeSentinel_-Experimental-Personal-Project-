<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HomeSentinel</title>
<style>
  :root {
    --bg: #0e1419;
    --panel: #161e26;
    --panel-2: #1c2630;
    --line: #263340;
    --ink: #e4ecf2;
    --ink-dim: #8499a8;
    --ink-faint: #5c6f7d;
    --teal: #3fd0a8;
    --amber: #f5a623;
    --red: #e2564b;
    --blue: #5aa9e6;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: var(--sans); font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 22px; border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  .logo {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--teal); box-shadow: 0 0 0 0 var(--teal);
    animation: pulse 2.4s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(63,208,168,.5); }
    70% { box-shadow: 0 0 0 8px rgba(63,208,168,0); }
    100% { box-shadow: 0 0 0 0 rgba(63,208,168,0); }
  }
  @media (prefers-reduced-motion: reduce) { .logo { animation: none; } }
  h1 {
    font-size: 16px; font-weight: 600; letter-spacing: .02em;
  }
  h1 span { color: var(--ink-faint); font-weight: 400; }
  .spacer { flex: 1; }
  button {
    font-family: var(--sans); font-size: 13px; color: var(--bg);
    background: var(--teal); border: none; border-radius: 6px;
    padding: 8px 14px; cursor: pointer; font-weight: 600;
  }
  button:hover { filter: brightness(1.08); }
  button:disabled { opacity: .5; cursor: default; }
  main { padding: 22px; max-width: 1100px; margin: 0 auto; }
  .stats {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 12px; margin-bottom: 22px;
  }
  .stat {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 8px; padding: 16px;
  }
  .stat .num { font-size: 30px; font-weight: 700; font-family: var(--mono); }
  .stat .lbl {
    font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--ink-dim); margin-top: 2px;
  }
  .stat.online .num { color: var(--teal); }
  .stat.alerts .num { color: var(--amber); }
  .grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 18px; }
  @media (max-width: 820px) {
    .grid { grid-template-columns: 1fr; }
    .stats { grid-template-columns: repeat(2, 1fr); }
  }
  .panel {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 8px; overflow: hidden;
  }
  .panel h2 {
    font-size: 12px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--ink-dim); padding: 14px 16px; border-bottom: 1px solid var(--line);
    font-weight: 600;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; font-size: 10px; text-transform: uppercase;
    letter-spacing: .06em; color: var(--ink-faint); font-weight: 600;
    padding: 8px 16px; border-bottom: 1px solid var(--line);
  }
  td { padding: 10px 16px; border-bottom: 1px solid var(--panel-2); font-size: 13px; }
  tr:last-child td { border-bottom: none; }
  .mono { font-family: var(--mono); font-size: 12px; }
  .dim { color: var(--ink-dim); }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot.on { background: var(--teal); }
  .dot.off { background: var(--ink-faint); }
  .tag {
    font-size: 10px; text-transform: uppercase; letter-spacing: .04em;
    padding: 2px 7px; border-radius: 4px; background: var(--panel-2);
    color: var(--ink-dim); border: 1px solid var(--line);
  }
  .tag.rand { color: var(--amber); border-color: #4a3a1a; }
  .ev { padding: 11px 16px; border-bottom: 1px solid var(--panel-2); display: flex; gap: 10px; }
  .ev:last-child { border-bottom: none; }
  .ev .sev { width: 3px; border-radius: 2px; flex-shrink: 0; }
  .ev .sev.info { background: var(--blue); }
  .ev .sev.warning { background: var(--amber); }
  .ev .sev.critical { background: var(--red); }
  .ev .body { flex: 1; min-width: 0; }
  .ev .t { font-size: 11px; color: var(--ink-faint); font-family: var(--mono); }
  .ev .d { font-size: 13px; margin-top: 1px; word-break: break-word; }
  .empty { padding: 28px 16px; text-align: center; color: var(--ink-faint); font-size: 13px; }
  footer { text-align: center; color: var(--ink-faint); font-size: 11px; padding: 24px; }
</style>
</head>
<body>
<header>
  <span class="logo" id="logo"></span>
  <h1>HomeSentinel <span>/ network watch</span></h1>
  <span class="spacer"></span>
  <button id="scanBtn">Scan now</button>
</header>
<main>
  <div class="stats">
    <div class="stat"><div class="num" id="sTotal">–</div><div class="lbl">Devices</div></div>
    <div class="stat online"><div class="num" id="sOnline">–</div><div class="lbl">Online</div></div>
    <div class="stat"><div class="num" id="sOffline">–</div><div class="lbl">Offline</div></div>
    <div class="stat alerts"><div class="num" id="sScan">–</div><div class="lbl">Last scan (ms)</div></div>
  </div>
  <div class="grid">
    <div class="panel">
      <h2>Inventory</h2>
      <table>
        <thead><tr><th>Device</th><th>IP</th><th>Vendor</th><th>Class</th></tr></thead>
        <tbody id="devBody"><tr><td colspan="4" class="empty">Scanning…</td></tr></tbody>
      </table>
    </div>
    <div class="panel">
      <h2>Timeline</h2>
      <div id="evBody"><div class="empty">No events yet</div></div>
    </div>
  </div>
</main>
<footer>HomeSentinel · ESP32-S3 · refreshing every 10s</footer>
<script>
  const $ = id => document.getElementById(id);
  function esc(s){ return (s||"").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function ago(ts){
    const d = Math.max(0, Math.floor(Date.now()/1000) - ts);
    if (d < 60) return d + "s";
    if (d < 3600) return Math.floor(d/60) + "m";
    if (d < 86400) return Math.floor(d/3600) + "h";
    return Math.floor(d/86400) + "d";
  }
  async function getJSON(url, opts){
    const r = await fetch(url, opts);
    if (!r.ok) throw new Error(r.status);
    return r.json();
  }
  async function refresh(){
    try {
      const [stats, devs, evs] = await Promise.all([
        getJSON('/api/stats'), getJSON('/api/devices'), getJSON('/api/events')
      ]);
      $('sTotal').textContent = stats.total;
      $('sOnline').textContent = stats.online;
      $('sOffline').textContent = stats.offline;
      $('sScan').textContent = stats.last_scan_ms;

      // Sort: online first, then by IP.
      devs.sort((a,b) => (b.online - a.online) || a.ip.localeCompare(b.ip, undefined, {numeric:true}));
      $('devBody').innerHTML = devs.length ? devs.map(d => `
        <tr>
          <td>
            <span class="dot ${d.online?'on':'off'}"></span>
            ${d.host ? esc(d.host) : '<span class="dim mono">'+esc(d.mac)+'</span>'}
            ${d.randomized ? '<span class="tag rand">random</span>' : ''}
          </td>
          <td class="mono dim">${esc(d.ip)}</td>
          <td>${esc(d.vendor) || '<span class="dim">—</span>'}</td>
          <td><span class="tag">${esc(d.class)}</span></td>
        </tr>`).join('') :
        '<tr><td colspan="4" class="empty">No devices found yet</td></tr>';

      $('evBody').innerHTML = evs.length ? evs.map(e => `
        <div class="ev">
          <div class="sev ${e.sev}"></div>
          <div class="body">
            <div class="t">${ago(e.ts)} ago · ${esc(e.type.replace(/_/g,' '))}</div>
            <div class="d">${esc(e.detail)}</div>
          </div>
        </div>`).join('') :
        '<div class="empty">No events yet</div>';
    } catch(err) {
      // Leave existing content; transient fetch errors shouldn't blank the UI.
    }
  }
  $('scanBtn').addEventListener('click', async () => {
    $('scanBtn').disabled = true;
    $('scanBtn').textContent = 'Scanning…';
    try { await fetch('/api/scan', {method:'POST'}); } catch(e){}
    setTimeout(async () => {
      await refresh();
      $('scanBtn').disabled = false;
      $('scanBtn').textContent = 'Scan now';
    }, 2500);
  });
  refresh();
  setInterval(refresh, 10000);
</script>
</body>
</html>
